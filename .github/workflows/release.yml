name: Release

# Ein Tag löst aus. Die Reihenfolge ist Absicht: erst prüfen, dann testen, dann bauen,
# dann veröffentlichen. Ein Release mit falscher Nummer ist schlimmer als keins —
# es ist unauffällig falsch.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Tag gegen die Paketversion prüfen
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(grep -m1 '^version' pyproject.toml | cut -d'"' -f2)
          echo "Tag $TAG, pyproject $PKG"
          [ "$TAG" = "$PKG" ] || { echo "Tag und Paketversion laufen auseinander"; exit 1; }
          grep -q "## \[$PKG\]" CHANGELOG.md || { echo "CHANGELOG kennt $PKG nicht"; exit 1; }

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd  # v2.1.2

      - name: Suite fahren, bevor irgendetwas veröffentlicht wird
        run: |
          pip install -e ".[dev]"
          ./scripts/check.sh

      - name: Registry-Namen kleinschreiben
        # github.repository_owner liefert die Schreibweise des Kontos; buildx verlangt
        # Kleinbuchstaben und bricht sonst ab — bei grünem Job und fehlendem Abbild.
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Abbild bauen und veröffentlichen (genau ein Tag, kein latest)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ./app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/dashmyboard:${{ github.ref_name }}

      - name: Digest ins Log — wer es ernst meint, pinnt ihn
        run: echo "ghcr.io/${{ env.OWNER_LC }}/dashmyboard@${{ steps.build.outputs.digest }}"

      - name: Release anlegen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "Abbild: \`ghcr.io/${OWNER_LC}/dashmyboard:${GITHUB_REF_NAME}\`

          Digest: \`${{ steps.build.outputs.digest }}\`

          Änderungen: siehe [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/CHANGELOG.md)"
