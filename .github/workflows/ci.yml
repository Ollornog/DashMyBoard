name: CI

# Feature-Branches laufen bewusst ohne CI — dort ist `ci-local` das Sicherheitsnetz.
# Das Gate sind Pull Requests und main.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    # Öffentliches Repo ⇒ GitHub-Runner. Self-hosted Runner sind hier tabu: ein Fork-PR
    # würde fremden Workflow-Code auf eigener Hardware ausführen.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Die Ränder, die pyproject zusagt: min, prod (Image), max.
        python: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python }}

      - name: Chrome (nur für den Browser-Test)
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce  # v1

      - name: Abhängigkeiten
        run: pip install -e ".[dev]"

      - name: Suite (Fach + Browser + Hygiene)
        run: ./scripts/check.sh

      - name: Wiederholbarkeit — dieselbe Suite ein zweites Mal
        run: ./scripts/check.sh

      # Dieselbe Prüfung, die der pre-push-Hook fährt. Vorher stand hier ein roher
      # `git status --porcelain`, der `.ci-allow-dirty` nicht kannte — das verbindliche
      # Gate widersprach damit dem lokalen Netz.
      - name: Arbeitsverzeichnis ist unverändert geblieben
        run: ./scripts/_residue_check.sh check

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Image bauen (nicht veröffentlichen)
        run: docker build -t dashmyboard:ci ./app
